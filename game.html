<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mini Minecraft 2 blocs</title>
<style>
html,body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#87CEEB;

}

canvas{
display:block;
cursor:crosshair;

}

#ui{
position:fixed;
top:10px;
left:10px;
background:rgba(0,0,0,.5);
color:#fff;
padding:10px;
border-radius:8px;
font-size:14px;

}

</style>
</head>
<body>
<canvas id="c">
</canvas>
<audio id="music" src="audio.mp3" loop>
</audio>
<div id="ui">Déplacement : ZQSD ou flèches<br>1 = herbe | 2 = pierre<br>P = musique ON/OFF<br>Clic gauche : casser<br>Clic droit : poser bloc sélectionné</div>
<script>
const canvas=document.getElementById("c"),ctx=canvas.getContext("2d"),music=document.getElementById("music");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;

}
addEventListener("resize",resize);
resize();

const size=32,W=160,H=40,world=[];

for(let y=0;
y<H;
y++){
world[y]=[];
for(let x=0;
x<W;
x++)world[y][x]=y>26?2:y>23?1:0;

}

const colors={
1:"#2ecc71",2:"#7f8c8d"
}
;

const player={
x:200,y:200,vx:0,vy:0,w:24,h:46,ground:false
}
,keys={

}
;
let selectedBlock=1,musicPlaying=false;

onkeydown=e=>{
keys[e.key.toLowerCase()]=true;
if(e.key==="1")selectedBlock=1;
if(e.key==="2")selectedBlock=2;

if(e.key.toLowerCase()==="p"&&!e.repeat){
if(musicPlaying){
music.pause();
musicPlaying=false;

}
else{
music.play();
musicPlaying=true;

}

}

}
;

onkeyup=e=>keys[e.key.toLowerCase()]=false;
canvas.oncontextmenu=e=>e.preventDefault();

canvas.onmousedown=e=>{
const camx=player.x-canvas.width/2,camy=player.y-canvas.height/2,tx=Math.floor((e.clientX+camx)/size),ty=Math.floor((e.clientY+camy)/size);
if(tx<0||ty<0||tx>=W||ty>=H)return;
if(e.button===0)world[ty][tx]=0;
else world[ty][tx]=selectedBlock;

}
;

function solid(x,y){
const tx=Math.floor(x/size),ty=Math.floor(y/size);
if(tx<0||ty<0||tx>=W||ty>=H)return true;
return world[ty][tx]!=0;

}

function update(){
player.vx=0;
if(keys.q||keys.a||keys.arrowleft)player.vx=-4;
if(keys.d||keys.arrowright)player.vx=4;
if((keys.z||keys.w||keys.arrowup)&&player.ground){
player.vy=-10;
player.ground=false;

}
player.vy+=.5;
player.x+=player.vx;
if(solid(player.x,player.y)||solid(player.x+player.w,player.y)||solid(player.x,player.y+player.h)||solid(player.x+player.w,player.y+player.h))player.x-=player.vx;
player.y+=player.vy;
if(player.vy>0&&(solid(player.x,player.y+player.h)||solid(player.x+player.w,player.y+player.h))){
player.y=Math.floor((player.y+player.h)/size)*size-player.h-1;
player.vy=0;
player.ground=true;

}
if(player.vy<0&&(solid(player.x,player.y)||solid(player.x+player.w,player.y)))player.vy=0;
draw();
requestAnimationFrame(update);

}

function draw(){
ctx.fillStyle="#87CEEB";
ctx.fillRect(0,0,canvas.width,canvas.height);
const camx=player.x-canvas.width/2,camy=player.y-canvas.height/2;
for(let y=0;
y<H;
y++)for(let x=0;
x<W;
x++){
const b=world[y][x];
if(!b)continue;
ctx.fillStyle=colors[b];
ctx.fillRect(x*size-camx,y*size-camy,size,size);
ctx.strokeStyle="rgba(0,0,0,.25)";
ctx.strokeRect(x*size-camx,y*size-camy,size,size);

}
ctx.fillStyle="#e74c3c";
ctx.fillRect(player.x-camx,player.y-camy,player.w,player.h);

}

update();

</script>
</body>
</html>
